{% extends "public_layout.html" %}
{% set page_title = "かんたん追加 ログイン" %}
{% block content %}
<section class="public-panel">
  <h1>Discordでログイン</h1>
  <p class="public-muted">参加しているサーバーに追加できる候補だけを表示します。</p>
  {% if error %}
  <div class="public-alert">ログインできませんでした。</div>
  {% endif %}
  {% if oauth_configured %}
  <a class="public-primary" href="/auth/discord?public=1">Discordでログイン</a>
  {% else %}
  <div class="public-alert">現在ログイン設定が使えません。</div>
  {% endif %}
</section>
{% endblock %}
