<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title or "かんたん追加" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body class="public-page">
  <main class="public-shell">
    <header class="public-header">
      <a class="public-brand" href="/public">かんたん追加</a>
      {% if selected_scope %}
      <div class="public-scope">
        <span>Bot: {{ selected_scope.bot_display_name }}</span>
        <span>サーバー: {{ selected_scope.guild_name }}</span>
      </div>
      {% endif %}
    </header>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
