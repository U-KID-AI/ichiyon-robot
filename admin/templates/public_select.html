{% extends "public_layout.html" %}
{% set page_title = "追加先を選ぶ" %}
{% block content %}
<section class="public-panel">
  <h1>追加先を選ぶ</h1>
  <p class="public-muted">候補を追加したいBotとサーバーを選んでください。</p>
  <div class="public-card-grid">
    {% for index, scope in scopes %}
    <form method="post" action="/public/select" class="public-card">
      <input type="hidden" name="scope_index" value="{{ index }}">
      <h2>{{ scope.guild_name }}</h2>
      <p>{{ scope.bot_display_name }}</p>
      <button class="public-primary" type="submit">選ぶ</button>
    </form>
    {% endfor %}
  </div>
</section>
{% endblock %}
