{% extends "layout.html" %}

{% block title %}入室時・復活時セリフ{% endblock %}
{% block heading %}入室時・復活時セリフ{% endblock %}

{% block content %}
  {% if saved %}
    <section class="alert success">保存しました。</section>
  {% endif %}

  <form class="panel form-grid" method="post">
    <p class="muted mobile-hidden-description">
      選択中Botとこのサーバーの組み合わせで使うセリフです。未設定の場合、いちよんロボは既存の復活セリフを使います。
    </p>
    <label class="checkbox-row">
      <input type="checkbox" name="enabled" {% if enabled %}checked{% endif %} {% if not can_edit %}disabled{% endif %}>
      有効
    </label>
    <label>
      入室時セリフ
      <textarea name="join_line" rows="3" {% if not can_edit %}disabled{% endif %}>{{ join_line }}</textarea>
    </label>
    <label>
      復活時セリフ
      <textarea name="revive_line" rows="3" {% if not can_edit %}disabled{% endif %}>{{ revive_line }}</textarea>
    </label>
    <p class="muted">既定の復活時セリフ: {{ default_revive_line }}</p>
    <div class="form-actions">
      <button type="submit" {% if not can_edit %}disabled{% endif %}>保存</button>
      <a class="button" href="/guilds/{{ guild_id }}">戻る</a>
    </div>
  </form>
{% endblock %}
