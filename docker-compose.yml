services:
  db:
    image: postgres:16
    container_name: ichiyon-robot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ichiyon_robot}
      POSTGRES_USER: ${POSTGRES_USER:-ichiyon_robot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ichiyon_robot_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ichiyon-robot-admin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      BOT_INSTANCE_ID: ${BOT_INSTANCE_ID:-ichiyon}
      BOT_DATA_BACKEND: ${BOT_DATA_BACKEND:-${ICHIYON_DATA_BACKEND:-db}}
      ICHIYON_DATA_BACKEND: ${ICHIYON_DATA_BACKEND:-db}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://ichiyon_robot:ichiyon_robot_password@db:5432/ichiyon_robot}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:-http://localhost:8080}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-local_development_session_secret_change_me}
      DISCORD_OAUTH_CLIENT_ID: ${DISCORD_OAUTH_CLIENT_ID:-}
      DISCORD_OAUTH_CLIENT_SECRET: ${DISCORD_OAUTH_CLIENT_SECRET:-}
      DISCORD_OAUTH_REDIRECT_URI: ${DISCORD_OAUTH_REDIRECT_URI:-http://localhost:8080/auth/discord/callback}
      X_SEARCH_ENABLED: ${X_SEARCH_ENABLED:-false}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
    command: >
      sh -c "uvicorn admin.main:app --host $${ADMIN_HOST:-0.0.0.0} --port $${ADMIN_PORT:-8080}"
    ports:
      - "${ADMIN_PORT:-8080}:${ADMIN_PORT:-8080}"
    volumes:
      - .:/app
      - ./secrets:/app/secrets:ro

  youtube-vpn-proxy:
    profiles:
      - youtube-vpn
    build:
      context: ./docker/youtube-vpn-proxy
      dockerfile: Dockerfile
    container_name: ichiyon-robot-youtube-vpn-proxy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      OPENVPN_CONFIG: /vpn/client.ovpn
      OPENVPN_DATA_CIPHERS: ${YOUTUBE_HOME_VPN_DATA_CIPHERS:-AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC}
      OPENVPN_DATA_CIPHERS_FALLBACK: ${YOUTUBE_HOME_VPN_DATA_CIPHERS_FALLBACK:-AES-128-CBC}
      OPENVPN_TUN_MTU: ${YOUTUBE_HOME_VPN_TUN_MTU:-1400}
      OPENVPN_MSSFIX: ${YOUTUBE_HOME_VPN_MSSFIX:-1360}
    volumes:
      - ${YOUTUBE_HOME_VPN_OVPN_PATH:-/home/ubuntu/OpenVPN-Config.ovpn}:/vpn/client.ovpn:ro
    healthcheck:
      test: ["CMD-SHELL", "ip link show tun0 >/dev/null 2>&1 && nc -z 127.0.0.1 8888"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  bot:
    profiles:
      - bot
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ichiyon-robot-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      BOT_INSTANCE_ID: ${BOT_INSTANCE_ID:-ichiyon}
      ENABLE_DEV_COMMANDS: ${ENABLE_DEV_COMMANDS:-true}
      BOT_DATA_BACKEND: ${BOT_DATA_BACKEND:-${ICHIYON_DATA_BACKEND:-db}}
      ICHIYON_DATA_BACKEND: ${ICHIYON_DATA_BACKEND:-db}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://ichiyon_robot:ichiyon_robot_password@db:5432/ichiyon_robot}
      ICHIYON_DISCORD_TOKEN: ${ICHIYON_DISCORD_TOKEN:-}
      IRSIA_DISCORD_TOKEN: ${IRSIA_DISCORD_TOKEN:-}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-${DISCORD_BOT_TOKEN:-}}
      X_SEARCH_ENABLED: ${X_SEARCH_ENABLED:-false}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      X_SEARCH_MODE: ${X_SEARCH_MODE:-recent}
      X_SEARCH_LOOKBACK_DAYS: ${X_SEARCH_LOOKBACK_DAYS:-14}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      YOUTUBE_HOME_VPN_ENABLED: ${YOUTUBE_HOME_VPN_ENABLED:-false}
      YOUTUBE_HOME_VPN_PROXY_URL: ${YOUTUBE_HOME_VPN_PROXY_URL:-http://youtube-vpn-proxy:8888}
      YOUTUBE_HOME_VPN_CONNECT_TIMEOUT_SECONDS: ${YOUTUBE_HOME_VPN_CONNECT_TIMEOUT_SECONDS:-5}
      YOUTUBE_HOME_VPN_EXTRACT_TIMEOUT_SECONDS: ${YOUTUBE_HOME_VPN_EXTRACT_TIMEOUT_SECONDS:-30}
      YOUTUBE_HOME_VPN_FALLBACK_ENABLED: ${YOUTUBE_HOME_VPN_FALLBACK_ENABLED:-true}
      STARTUP_CHANNEL_ID: ${STARTUP_CHANNEL_ID:-0}
      SCHEDULE_CHANNEL_ID: ${SCHEDULE_CHANNEL_ID:-0}
    command: python main.py
    volumes:
      - .:/app
      - ./secrets:/app/secrets:ro

  bot-irsia:
    profiles:
      - irsia
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ichiyon-robot-irsia-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      BOT_INSTANCE_ID: irsia
      ENABLE_DEV_COMMANDS: ${ENABLE_DEV_COMMANDS:-true}
      BOT_DATA_BACKEND: ${BOT_DATA_BACKEND:-${ICHIYON_DATA_BACKEND:-db}}
      ICHIYON_DATA_BACKEND: ${ICHIYON_DATA_BACKEND:-db}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://ichiyon_robot:ichiyon_robot_password@db:5432/ichiyon_robot}
      IRSIA_DISCORD_TOKEN: ${IRSIA_DISCORD_TOKEN:-}
      X_SEARCH_ENABLED: ${X_SEARCH_ENABLED:-false}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      X_SEARCH_MODE: ${X_SEARCH_MODE:-recent}
      X_SEARCH_LOOKBACK_DAYS: ${X_SEARCH_LOOKBACK_DAYS:-14}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      YOUTUBE_HOME_VPN_ENABLED: ${YOUTUBE_HOME_VPN_ENABLED:-false}
      YOUTUBE_HOME_VPN_PROXY_URL: ${YOUTUBE_HOME_VPN_PROXY_URL:-http://youtube-vpn-proxy:8888}
      YOUTUBE_HOME_VPN_CONNECT_TIMEOUT_SECONDS: ${YOUTUBE_HOME_VPN_CONNECT_TIMEOUT_SECONDS:-5}
      YOUTUBE_HOME_VPN_EXTRACT_TIMEOUT_SECONDS: ${YOUTUBE_HOME_VPN_EXTRACT_TIMEOUT_SECONDS:-30}
      YOUTUBE_HOME_VPN_FALLBACK_ENABLED: ${YOUTUBE_HOME_VPN_FALLBACK_ENABLED:-true}
      STARTUP_CHANNEL_ID: ${IRSIA_STARTUP_CHANNEL_ID:-0}
      SCHEDULE_CHANNEL_ID: ${IRSIA_SCHEDULE_CHANNEL_ID:-0}
      NORMAL_BOT_NICKNAME: ${IRSIA_NORMAL_BOT_NICKNAME:-イルシア}
      BOT_ROLE_NAME: ${IRSIA_BOT_ROLE_NAME:-イルシア-role}
    command: python main.py
    volumes:
      - .:/app
      - ./secrets:/app/secrets:ro

volumes:
  postgres_data:
