User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"
LogFile "/dev/stdout"
LogLevel Info
PidFile "/tmp/tinyproxy.pid"
MaxClients 100
MinSpareServers 2
MaxSpareServers 10
StartServers 2
ConnectPort 443
ConnectPort 563
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16
