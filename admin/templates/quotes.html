{% extends "layout.html" %}

{% block title %}名言管理 - いちよんロボ{% endblock %}
{% block heading %}名言管理{% endblock %}

{% block content %}
  <section class="panel">
    <h2>名言を追加</h2>
    <form class="quote-form" method="post" action="/quotes">
      <label>
        本文
        <textarea name="text" rows="4" required></textarea>
      </label>
      <label class="check-row">
        <input type="checkbox" name="enabled" checked>
        有効
      </label>
      <button type="submit">追加</button>
    </form>
  </section>

  <section class="panel">
    <h2>名言一覧</h2>
    <div class="quote-list">
      {% for quote in quotes %}
        <article class="quote-item">
          <form class="quote-form" method="post" action="/quotes/{{ quote.id }}/edit">
            <div class="quote-meta">
              <span>{{ quote.id }}</span>
              {% if quote.enabled %}
                <strong class="status enabled">有効</strong>
              {% else %}
                <strong class="status disabled">無効</strong>
              {% endif %}
            </div>
            <label>
              本文
              <textarea name="text" rows="4" required>{{ quote.text }}</textarea>
            </label>
            <div class="actions">
              <label class="check-row">
                <input type="checkbox" name="enabled" {% if quote.enabled %}checked{% endif %}>
                有効
              </label>
              <button type="submit">保存</button>
            </div>
          </form>
          <form method="post" action="/quotes/{{ quote.id }}/delete">
            <button class="danger" type="submit">削除</button>
          </form>
        </article>
      {% else %}
        <p class="empty">名言はまだありません。</p>
      {% endfor %}
    </div>
  </section>
{% endblock %}
